name: Build Audio2SRT

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Audio2SRT-Windows
          - os: macos-latest
            artifact_name: Audio2SRT-macOS
          - os: ubuntu-latest
            artifact_name: Audio2SRT-Linux
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        run: |
          python -m PyInstaller main.py --name=Audio2SRT --windowed --onedir --clean --noconfirm --collect-all=customtkinter --collect-all=faster-whisper --hidden-import=faster_whisper --hidden-import=ctranslate2 --hidden-import=huggingface_hub --hidden-import=av
      
      - name: Build on macOS
        if: matrix.os == 'macos-latest'
        run: |
          python -m PyInstaller main.py --name=Audio2SRT --windowed --onedir --clean --noconfirm --collect-all=customtkinter --collect-all=faster-whisper --hidden-import=faster_whisper --hidden-import=ctranslate2 --hidden-import=huggingface_hub --hidden-import=av
      
      - name: Build on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m PyInstaller main.py --name=Audio2SRT --console --onedir --clean --noconfirm --collect-all=customtkinter --collect-all=faster-whisper --hidden-import=faster_whisper --hidden-import=ctranslate2 --hidden-import=huggingface_hub --hidden-import=av
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          retention-days: 5
